<!doctype html>
<html lang="es">
  <head>
    <title>Login - SmartWaste</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <h2>Iniciar Sesión</h2>
    <form id="login-form">
      <label for="username_login">Usuario:</label>
      <input type="text" id="username_login" />
      <br /><br />
      
      <label for="password_login">Contraseña:</label>
      <input type="password" id="password_login" />
      <br /><br />
      
      <input type="submit" value="Ingresar" />
    </form>
    
    <div id="resultado-login-div"></div>

    <script type="module" src="./src/presenterLogin.js"></script>
  </body>
</html>
