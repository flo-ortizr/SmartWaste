<!doctype html>
<html lang="es">
  <head>
    <title>SmartWaste</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <hr />
    <h2>Rutas de Recolección EMSA</h2>
    <button id="btn-ver-rutas">Ver Rutas Registradas</button>
    <div id="lista-rutas-div"></div>

    <hr />
    <h2>Resumen de Reportes Ciudadanos</h2>
    <button id="btn-ver-reportes">Ver Reportes</button>
    <div id="lista-reportes-div"></div>
    <div id="detalle-reporte-div"></div>

    <hr />
    <h1>Crear rutas de carros basureros</h1>
    <form id="ruta-form">
      <label for="nombre_ruta">Nombre de la ruta:</label>
      <input type="text" id="nombre_ruta" />

      <label for="zona_ruta">Zona:</label>
      <input type="text" id="zona_ruta" />

      <label for="dias_ruta">Días de recolección:</label>
      <input type="text" id="dias_ruta" />

      <label for="cobertura_ruta">Zonas que cubre:</label>
      <input type="text" id="cobertura_ruta" />

      <input type="submit" value="Guardar ruta" />
    </form>
    <div id="resultado-ruta-div"></div>
    <hr />
    <div class="seccion-modificar-ruta">
       <h3>Modificar Ruta Registrada</h3>
        <form id="formulario-modificar-ruta">
            <input type="hidden" id="identificador_ruta_modificar" />
            <input type="text" id="nombre_ruta_modificar" placeholder="Nombre de la ruta" />
            <input type="text" id="zona_ruta_modificar" placeholder="Zona" />
            <input type="text" id="dias_ruta_modificar" placeholder="Días de recolección" />
            <input type="text" id="cobertura_ruta_modificar" placeholder="Cobertura" />
             <button type="submit">Guardar Cambios</button>
             </form>
             <div id="resultado-modificacion-ruta-div"></div>
            </div>

    <hr />
    <h2>Registrar Horario de Ruta</h2>
    <label for="ruta_horario">Ruta:</label>
    <input type="text" id="ruta_horario" />
    <label for="horario">Horario:</label>
    <input type="text" id="horario" />
    <button id="btn-registrar-horario">Registrar Horario</button>

    <div id="resultado-registrar-horario"></div>

    <hr />
    <h2>Eliminar ruta</h2>

    <label for="zona_eliminar">Zona:</label>
    <input type="text" id="zona_eliminar" />

    <button id="btn-eliminar-ruta">Eliminar ruta</button>

    <div id="resultado-eliminar-div"></div>

    <script type="module" src="./src/presenterEMSA.js"></script>
  </body>
</html>
