<!doctype html>
<html lang="es">
  <head>
    <title>SmartWaste</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <button id="btn-cerrar-sesion">Cerrar sesión</button>
    <hr />
    
    <h2>Buscar Ruta de Recolección</h2>
    <label for="buscar_zona_ruta">Ingresa tu zona:</label>
    <input type="text" id="buscar_zona_ruta" />
    <button id="btn-buscar-ruta">Buscar Ruta</button>
    <div id="resultado-busqueda-ruta-div"></div> //
    <hr />
    <h2>Horarios de Recolección</h2>
    <label for="zona_horario">Zona:</label>
    <input type="text" id="zona_horario" />
    <button id="btn-ver-horarios">Ver Horarios</button>

    <div id="resultado-horarios-div"></div>

    <h1>Reporte</h1>

    <form id="reporte-form">
      <label for="zona_reporte">Zona:</label>
      <select id="zona_reporte">
        <option value="">Seleccione una zona</option>
        <option>Cala Cala</option>
        <option>Las Cuadras</option>
        <option>Tupuraya</option>
        <option>Queru Queru</option>
        <option>Alalay</option>
        <option>Sarco</option>
        <option>Pacata</option>
        <option>Villa Busch</option>
        <option>Temporal</option>
        <option>Muyurina</option>
      </select>

      <br /><br />

      <label for="fecha_reporte">Fecha:</label>
      <input type="date" id="fecha_reporte" />

      <br /><br />

      <label for="mensaje_reporte">Descripción:</label>
      
      <input type="text" id="mensaje_reporte" />
       <br /><br />
      <label for="foto_reporte">Foto del reporte:</label>
      <input type="file" id="foto_reporte" accept="image/jpeg, image/png, image/jpg" />
      <br /><br />
      <div id="vista-previa-foto-div"></div>
  

      <input type="submit" value="Guardar reporte" />
    </form>

    <div id="resultado-div"></div>

    <hr />
    <h2>Registro de Ciudadano</h2>
    <form id="registro-ciudadano-form">
      <label for="username_registro">Usuario:</label>
      <input type="text" id="username_registro" />
      <br /><br />
      <label for="password_registro">Contraseña:</label>
      <input type="password" id="password_registro" />
      <br /><br />
      <input type="submit" value="Registrarme" />
    </form>
    <div id="resultado-registro-div"></div>

    <hr />
    <h2>Focos de Contaminación Cercanos</h2>
    <button id="btn-reportes-cercanos">Ver Reportes Cercanos a mi Ubicación</button>
    <div id="resultado-reportes-cercanos-div"></div>
    
     <hr />
     <div class="seccion-proxima-ruta">
         <h2>Próxima Ruta de Recolección</h2>
          <input type="text" id="zona_proxima_ruta" placeholder="Ingrese su zona o ubicación" />
          <button id="btn-proxima-ruta">Consultar Próxima Ruta</button>
          <div id="resultado-proxima-ruta-div"></div>
        </div>

    <script type="module" src="./src/presenterCiudadano.js"></script>
  </body>
</html>
