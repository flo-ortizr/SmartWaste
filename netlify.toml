[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# Redirige rutas directas a los HTML compilados
[[redirects]]
  from   = "/emsa"
  to     = "/emsa.html"
  status = 200

[[redirects]]
  from   = "/ciudadano"
  to     = "/ciudadano.html"
  status = 200

# Fallback: cualquier ruta no encontrada vuelve al login
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
